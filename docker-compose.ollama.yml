name: ${OLLAMA_DOCKER_PROJECT:-apex-infinite-ollama}

services:
  ollama:
    image: ${OLLAMA_DOCKER_IMAGE:-ollama/ollama:latest}
    container_name: ${OLLAMA_DOCKER_CONTAINER:-apex-infinite-ollama}
    restart: unless-stopped
    ports:
      - "${OLLAMA_DOCKER_BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  ollama-data:
    name: ${OLLAMA_DOCKER_VOLUME:-apex-infinite-ollama}
