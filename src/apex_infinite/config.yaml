# Choose active provider: ollama | grok | openai
provider: ollama

# Codex CLI agent configuration
codex:
  binary: "codex"
  # Shell-style string parsed with shlex; quote TOML values that contain spaces.
  exec_flags: "--dangerously-bypass-approvals-and-sandbox"
  # Passed to codex exec as: -c model_reasoning_effort="<value>"
  # Supported values: minimal, low, medium, high, xhigh.
  model_reasoning_effort: "xhigh"

# Operator display configuration
ui:
  theme: "auto"
  effect_level: "low"
  ascii: false
  compact: false
  show_elapsed: true
  show_provider: true
  themes: {}

providers:
  ollama:
    base_url: "http://${OLLAMA_HOST}:${OLLAMA_PORT}/v1"
    api_key: "${OLLAMA_API_KEY}"
    model: "${OLLAMA_MODEL}"

  grok:
    base_url: "https://api.x.ai/v1"
    api_key: "${XAI_API_KEY}"
    model: "grok-4-1-fast-reasoning"

  openai:
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
