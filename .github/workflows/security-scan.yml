name: Dependency Security Scan

on:
  schedule:
    # Weekly Monday 06:00 UTC recurring vulnerability scan.
    - cron: "0 6 * * 1"
  push:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/security-scan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (${{ matrix.lane.name }} lane)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: base
            extras: ""
          - name: dev
            extras: "[dev]"
          - name: visual
            extras: "[visual]"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lane dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".${{ matrix.lane.extras }}"
          python -m pip install pip-audit

      - name: Audit installed dependencies
        run: python -m pip_audit --skip-editable
